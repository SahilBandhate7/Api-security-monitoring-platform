# Lightweight compose for local development (infrastructure services only).
# Run the backend from your IDE or via `mvn spring-boot:run`.
#
# Usage: docker compose -f docker-compose.dev.yml up -d

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apiscan-postgres
    environment:
      POSTGRES_USER: apiscan
      POSTGRES_PASSWORD: apiscan123
      POSTGRES_DB: apiscan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiscan -d apiscan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apiscan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: apiscan-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: apiscan
      RABBITMQ_DEFAULT_PASS: apiscan123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
