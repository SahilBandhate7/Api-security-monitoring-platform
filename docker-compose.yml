version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apiscan-postgres
    environment:
      POSTGRES_USER: apiscan
      POSTGRES_PASSWORD: apiscan123
      POSTGRES_DB: apiscan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiscan -d apiscan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apiscan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: apiscan-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: apiscan
      RABBITMQ_DEFAULT_PASS: apiscan123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: apiscan-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/apiscan_db
      SPRING_DATASOURCE_USERNAME: apiscan
      SPRING_DATASOURCE_PASSWORD: apiscan123
      REDIS_URL: redis://redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: apiscan
      RABBITMQ_PASSWORD: apiscan123
      JWT_ACCESS_SECRET: dev-access-secret-must-be-at-least-64-characters-long-for-hmac-sha256-signing
      JWT_REFRESH_SECRET: dev-refresh-secret-must-be-at-least-64-characters-long-for-hmac-sha256-signing
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
